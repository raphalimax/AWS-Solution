name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Minimal permissions required by actions/deploy-pages
permissions:
  contents: read   # checkout only — never write to branches
  pages: write     # upload and publish the Pages artifact
  id-token: write  # OIDC token required by deploy-pages

# Prevent a second deploy from racing an active one.
# cancel-in-progress: false keeps the running deployment alive.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Surfaces the deployment URL in the GitHub UI (Actions + Deployments tabs)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Configures the Pages token and validates the source branch/path
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Packages the repo root as a Pages artifact (skips Jekyll automatically)
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # Deploys the artifact via the secure OIDC flow (no PAT / force-push needed)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
