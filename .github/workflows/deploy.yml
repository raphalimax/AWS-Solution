name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]   # Quality gates run on every PR
  workflow_dispatch:

# Job-level overrides declared per-job for least-privilege
permissions:
  contents: read

# PRs: cancel superseded runs to save minutes.
# Main: never cancel — a deploy in progress must finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# ── Job 1 · Quality gates (runs on PRs AND main) ──────────────────────────────
jobs:
  quality:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      security-events: write   # Required to upload SARIF results

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for accurate secret scanning

      # HTML structural validation — catches malformed tags, duplicate IDs, etc.
      - name: HTML Lint (htmlhint)
        run: npx --yes htmlhint@latest "*.html" --config .htmlhintrc

      # Scans git history for accidentally committed secrets (API keys, tokens, etc.)
      - name: Secrets Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # .gitleaks.toml in the repo root configures allowlisted patterns

# ── Job 2 · Deploy (main branch only, after quality gates pass) ──────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality                          # Blocked until quality passes
    if: github.ref == 'refs/heads/main'     # Never deploy from PRs

    permissions:
      contents: read
      pages: write      # Upload and publish the Pages artifact
      id-token: write   # OIDC token required by deploy-pages

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Validates Pages config and emits environment variables for the artifact upload
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Packages the repo root as a Pages artifact — Jekyll is skipped automatically
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # Deploys via OIDC — no PAT or force-push required
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
